<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitor de Energia</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:white; margin:0; padding:20px; }
    h1 { text-align:center; margin-bottom:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:20px; }
    .card { background:#1e293b; padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.3); text-align:center; }
    .card h2 { margin:10px 0; font-size:2em; }
    .chart-container { background:#1e293b; padding:20px; border-radius:15px; }
    .filtros { display:flex; gap:10px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
    input, button { padding:10px; border-radius:8px; border:none; }
    button { background:#22c55e; color:white; cursor:pointer; }
    .alert { color:#f87171; font-weight:bold; text-align:center; margin-top:10px; }
  </style>
</head>
<body>

<h1>Monitor de Energia IoT</h1>

<div class="filtros">
  <input type="date" id="inicio">
  <input type="date" id="fim">
  <button onclick="carregarDados()">Filtrar</button>
</div>

<div class="grid">
  <div class="card"><p>Potência Atual</p><h2 id="potencia">--</h2></div>
  <div class="card"><p>Tensão</p><h2 id="tensao">--</h2></div>
  <div class="card"><p>Corrente</p><h2 id="corrente">--</h2></div>
  <div class="card"><p>Média</p><h2 id="media">--</h2></div>
</div>

<div class="chart-container">
  <canvas id="grafico"></canvas>
</div>

<div class="alert" id="alerta"></div>

<script>
let chart;

async function carregarDados() {
  const inicio = document.getElementById('inicio').value;
  const fim = document.getElementById('fim').value;

  let url = 'http://localhost:3000/energia';
  if (inicio && fim) url += `?inicio=${inicio}&fim=${fim}`;

  const res = await fetch(url);
  const dados = await res.json();
  if (dados.length === 0) return;

  const labels = dados.map(d => d.created_at).reverse();
  const power = dados.map(d => d.power).reverse();
  const voltage = dados.map(d => d.voltage).reverse();
  const current = dados.map(d => d.current).reverse();

 const ultimo = {
  power: power[power.length - 1],
  voltage: voltage[voltage.length - 1],
  current: current[current.length - 1]
};
  document.getElementById('potencia').innerText = ultimo.power + ' W';
  document.getElementById('tensao').innerText = ultimo.voltage + ' V';
  document.getElementById('corrente').innerText = ultimo.current + ' A';

  const media = power.reduce((a,b)=>a+b,0)/power.length;
  document.getElementById('media').innerText = media.toFixed(2) + ' W';

  document.getElementById('alerta').innerText = ultimo.power > 2000 ? '⚠️ Consumo alto detectado!' : '';

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('grafico'), {
    type:'line',
    data:{
      labels: labels,
      datasets:[
        { label:'Potência (W)', data:power, borderWidth:2, yAxisID:'y' },
        { label:'Tensão (V)', data:voltage, borderWidth:2, yAxisID:'y1' },
        { label:'Corrente (A)', data:current, borderWidth:2, yAxisID:'y2' }
      ]
    },
    options: {
      responsive: true,
      interaction: {
        mode: 'index',
        intersect: false
      },
      stacked: false,
      scales: {
        y: {
          type: 'linear',
          position: 'left',
          title: {
            display: true,
            text: 'Potência (W)'
          }
        },
        y1: {
          type: 'linear',
          position: 'right',
          grid: {
            drawOnChartArea: false
          },
          title: {
            display: true,
            text: 'Tensão (V)'
          }
        },
        y2: {
          type: 'linear',
          position: 'right',
          offset: true,
          grid: {
            drawOnChartArea: false
          },
          title: {
            display: true,
            text: 'Corrente (A)'
          }
        }
      }
    }
  });
}

carregarDados();
setInterval(carregarDados, 60000);
</script>

</body>
</html>
