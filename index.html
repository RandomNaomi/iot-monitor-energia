<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitor de Energia</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#0b1120; color:white; margin:0; padding:20px; }
    h1 { text-align:center; margin-bottom:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:20px; }
    .card { background:#1e293b; padding:20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.3); text-align:center; }
    .card h2 { margin:10px 0; font-size:2.5em; font-weight: bold; }
    .card p { margin: 0; color: #94a3b8; font-size: 1.1em; }
    .chart-container { background:#1e293b; padding:20px; border-radius:10px; margin-bottom: 20px;}
    .filtros { display:flex; gap:10px; justify-content:center; margin-bottom:30px; flex-wrap:wrap; align-items: center; }
    input { padding:10px; border-radius:8px; border:none; background: #334155; color: white; color-scheme: dark; }
    button { padding:10px 20px; border-radius:8px; border:none; background:#16a34a; color:white; font-weight: bold; cursor:pointer; transition: 0.2s; }
    button:hover { background:#15803d; }
    .alert { color:#f87171; font-weight:bold; text-align:center; margin-top:10px; font-size: 1.2em; }
  </style>
</head>
<body>

<h1>Monitor de Energia IoT</h1>

<div class="filtros">
  <input type="date" id="inicio">
  <input type="date" id="fim">
  <button onclick="carregarDados()">Filtrar</button>
</div>

<div class="grid">
  <div class="card"><p>Potência Atual</p><h2 id="potencia">--</h2></div>
  <div class="card"><p>Tensão</p><h2 id="tensao">--</h2></div>
  <div class="card"><p>Corrente</p><h2 id="corrente">--</h2></div>
  <div class="card"><p>Média</p><h2 id="media">--</h2></div>
</div>

<div class="chart-container">
  <canvas id="grafico"></canvas>
</div>

<div class="alert" id="alerta"></div>

<script>
let chart;

async function carregarDados() {
  const inicio = document.getElementById('inicio').value;
  const fim = document.getElementById('fim').value;

  let url = 'http://localhost:3000/energia';
  if (inicio && fim) url += `?inicio=${inicio}&fim=${fim}`;

  try {
    const res = await fetch(url);
    const dados = await res.json();
    if (dados.length === 0) return;

    const labels = dados.map(d => d.created_at).reverse();
    const power = dados.map(d => d.power).reverse();
    const voltage = dados.map(d => d.voltage).reverse();
    const current = dados.map(d => d.current).reverse();

    const ultimo = {
      power: power[power.length - 1],
      voltage: voltage[voltage.length - 1],
      current: current[current.length - 1]
    };
    
    document.getElementById('potencia').innerText = ultimo.power + ' W';
    document.getElementById('tensao').innerText = ultimo.voltage + ' V';
    document.getElementById('corrente').innerText = ultimo.current + ' A';

    const media = power.reduce((a,b)=>a+b,0)/power.length;
    document.getElementById('media').innerText = media.toFixed(2) + ' W';

    document.getElementById('alerta').innerText = ultimo.power > 3000 ? '⚠️ Consumo alto detectado!' : '';

    if (chart) chart.destroy();

    // Configuração de cores baseada nas imagens do relatório
    chart = new Chart(document.getElementById('grafico'), {
      type:'line',
      data:{
        labels: labels,
        datasets:[
          { label:'Potência (W)', data:power, borderColor: '#38bdf8', backgroundColor: '#38bdf8', borderWidth:2, yAxisID:'y', tension: 0.1, pointRadius: 3 },
          { label:'Tensão (V)', data:voltage, borderColor: '#fb7185', backgroundColor: '#fb7185', borderWidth:2, yAxisID:'y1', tension: 0.1, pointRadius: 3 },
          { label:'Corrente (A)', data:current, borderColor: '#fbbf24', backgroundColor: '#fbbf24', borderWidth:2, yAxisID:'y2', tension: 0.1, pointRadius: 3 }
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        stacked: false,
        plugins: {
            legend: { labels: { color: 'white' } }
        },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
          y: {
            type: 'linear', display: true, position: 'left',
            title: { display: true, text: 'Potência (W)', color: '#94a3b8' },
            ticks: { color: '#94a3b8' }, grid: { color: '#334155' }
          },
          y1: {
            type: 'linear', display: true, position: 'right',
            grid: { drawOnChartArea: false },
            title: { display: true, text: 'Tensão (V)', color: '#94a3b8' },
            ticks: { color: '#94a3b8' }
          },
          y2: {
            type: 'linear', display: true, position: 'right', offset: true,
            grid: { drawOnChartArea: false },
            title: { display: true, text: 'Corrente (A)', color: '#94a3b8' },
            ticks: { color: '#94a3b8' }
          }
        }
      }
    });
  } catch (error) {
    console.error("Erro ao buscar dados do back-end:", error);
  }
}

carregarDados();
// Atualiza a cada 5 segundos (5000 ms) para dar a sensação de "tempo real"
setInterval(carregarDados, 5000);
</script>

</body>
</html>
