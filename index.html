<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitor de Energia Profissional</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#0b1120; color:white; margin:0; padding:20px; }
    h1 { text-align:center; margin-bottom:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:20px; }
    
    /* Cartões padrão */
    .card { background:#1e293b; padding:20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.3); text-align:center; transition: 0.5s; }
    .card h2 { margin:10px 0; font-size:2.2em; font-weight: bold; }
    .card p { margin: 0; color: #cbd5e1; font-size: 1em; text-transform: uppercase; letter-spacing: 1px; }
    
    /* Cores do Semáforo */
    .status-bom { background: #14532d !important; }     /* Verde escuro */
    .status-alerta { background: #713f12 !important; }  /* Amarelo/Laranja */
    .status-critico { background: #7f1d1d !important; } /* Vermelho escuro */

    .chart-container { background:#1e293b; padding:20px; border-radius:10px; margin-bottom: 20px;}
    .filtros { display:flex; gap:10px; justify-content:center; margin-bottom:30px; flex-wrap:wrap; align-items: center; }
    input { padding:10px; border-radius:8px; border:none; background: #334155; color: white; color-scheme: dark; }
    
    button { padding:10px 20px; border-radius:8px; border:none; color:white; font-weight: bold; cursor:pointer; transition: 0.2s; }
    .btn-filtrar { background:#16a34a; }
    .btn-exportar { background:#3b82f6; } /* Azul para exportar */
    button:hover { opacity: 0.8; }

    .alert { color:#f87171; font-weight:bold; text-align:center; margin-top:10px; font-size: 1.2em; min-height: 1.5em; }
  </style>
</head>
<body>

<h1>Monitor de Energia IoT</h1>

<div class="filtros">
  <input type="date" id="inicio">
  <input type="date" id="fim">
  <button class="btn-filtrar" onclick="carregarDados()">Filtrar Dados</button>
  <button class="btn-exportar" onclick="baixarCSV()">Baixar Relatório (CSV)</button>
</div>

<div class="grid">
  <div id="card-pot" class="card"><p>Potência Atual</p><h2 id="potencia">--</h2></div>
  <div class="card"><p>Tensão</p><h2 id="tensao">--</h2></div>
  <div class="card"><p>Corrente</p><h2 id="corrente">--</h2></div>
  <div class="card"><p>Consumo Acumulado</p><h2 id="energia">--</h2></div>
  <div class="card"><p>Custo Est. (Hora)</p><h2 id="custo" style="color: #4ade80;">--</h2></div>
</div>

<div class="chart-container">
  <canvas id="grafico"></canvas>
</div>

<div class="alert" id="alerta"></div>

<script>
let chart;
let dadosAtuais = []; // Guarda os dados para exportar depois

async function carregarDados() {
  const inicio = document.getElementById('inicio').value;
  const fim = document.getElementById('fim').value;

  let url = 'http://localhost:3000/energia';
  if (inicio && fim) url += `?inicio=${inicio}&fim=${fim}`;

  try {
    const res = await fetch(url);
    dadosAtuais = await res.json();
    if (dadosAtuais.length === 0) return;

    const labels = dadosAtuais.map(d => new Date(d.created_at).toLocaleTimeString()).reverse();
    const power = dadosAtuais.map(d => d.power).reverse();
    const voltage = dadosAtuais.map(d => d.voltage).reverse();
    const current = dadosAtuais.map(d => d.current).reverse();

    const ultimo = {
      power: power[power.length - 1],
      voltage: voltage[voltage.length - 1],
      current: current[current.length - 1]
    };
    
    // Atualiza textos
    document.getElementById('potencia').innerText = ultimo.power + ' W';
    document.getElementById('tensao').innerText = ultimo.voltage + ' V';
    document.getElementById('corrente').innerText = ultimo.current + ' A';

    // Cálculo de Custo (Watts / 1000 * Preço kWh)
    const precoKwh = 0.70;
    const custoHora = (ultimo.power / 1000) * precoKwh;
    document.getElementById('custo').innerText = 'R$ ' + custoHora.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

    // Lógica do Semáforo (Cores)
    const cardPot = document.getElementById('card-pot');
    cardPot.classList.remove('status-bom', 'status-alerta', 'status-critico');
    
    if (ultimo.power > 3000) {
        cardPot.classList.add('status-critico');
        document.getElementById('alerta').innerText = '⚠️ ALERTA: CONSUMO CRÍTICO!';
    } else if (ultimo.power > 1000) {
        cardPot.classList.add('status-alerta');
        document.getElementById('alerta').innerText = 'Atenção: Consumo elevado.';
    } else {
        cardPot.classList.add('status-bom');
        document.getElementById('alerta').innerText = '';
    }

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById('grafico'), {
      type:'line',
      data:{
        labels: labels,
        datasets:[
          { label:'Potência (W)', data:power, borderColor: '#38bdf8', borderWidth:3, yAxisID:'y', tension: 0.3 },
          { label:'Tensão (V)', data:voltage, borderColor: '#fb7185', borderWidth:2, yAxisID:'y1', tension: 0.3 },
          { label:'Corrente (A)', data:current, borderColor: '#fbbf24', borderWidth:2, yAxisID:'y2', tension: 0.3 }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: 'white' } } },
        scales: {
          x: { ticks: { color: '#94a3b8' } },
          y: { // Potência (Azul)
            type: 'linear', position: 'left',
            title: { display: true, text: 'Watts', color: '#38bdf8' },
            ticks: { color: '#38bdf8' }
          },
          y1: { // Tensão (Rosa)
            type: 'linear', position: 'right',
            title: { display: true, text: 'Volts', color: '#fb7185' },
            ticks: { color: '#fb7185' },
            grid: { drawOnChartArea: false }
          },
          y2: { // Corrente (Amarelo)
            type: 'linear', position: 'right', offset: true,
            title: { display: true, text: 'Amperes', color: '#fbbf24' },
            ticks: { color: '#fbbf24' },
            grid: { drawOnChartArea: false }
          }
        }
      }
    });
  } catch (error) { console.error("Erro:", error); }
}

function baixarCSV() {
    if (dadosAtuais.length === 0) return alert("Sem dados para exportar!");
    let csv = "Data/Hora,Voltagem,Corrente,Potencia\n";
    dadosAtuais.forEach(row => {
        csv += `${row.created_at},${row.voltage},${row.current},${row.power}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'relatorio_energia.csv';
    a.click();
}

carregarDados();
setInterval(carregarDados, 5000);
</script>
</body>
</html>
